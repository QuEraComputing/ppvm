version = 1
revision = 2
requires-python = ">=3.8"

[manifest]
members = [
    "pauli-propagation",
    "ppvm-py",
]

[[package]]
name = "pauli-propagation"
version = "0.1.0"
source = { virtual = "pauli_propagation" }

[[package]]
name = "ppvm-py"
source = { editable = "." }
dependencies = [
    { name = "pauli-propagation" },
]

[package.metadata]
requires-dist = [{ name = "pauli-propagation", virtual = "pauli_propagation" }]
