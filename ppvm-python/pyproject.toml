[project]
name = "ppvm"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "David Plankensteiner", email = "dplankensteiner@quera.com" }
]
requires-python = ">=3.10"
dependencies = [
    "ppvm-python-native",
]

[project.scripts]
ppvm = "ppvm:main"

[build-system]
requires = ["uv_build>=0.9.21,<0.10.0"]
build-backend = "uv_build"

[tool.uv.sources]
ppvm-python-native = { path = "../crates/ppvm-python-native" }

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pytest>=9.0.2",
]
doc = [
    "griffe-inherited-docstrings>=1.1.1",
    "mike>=2.1.3",
    "mkdocs>=1.6.1",
    "mkdocs-gen-files>=0.5.0",
    "mkdocs-jupyter>=0.25.1",
    "mkdocs-literate-nav>=0.6.1",
    "mkdocs-material>=9.5.44",
    "mkdocstrings[python]>=0.27.0",
]
