fail_fast = true

# Built-in hooks (native Rust, fast)
[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "check-merge-conflict" },
  { id = "check-added-large-files", args = ["--maxkb=512"] },
  { id = "detect-private-key" },
  { id = "no-commit-to-branch", args = ["-b", "main"] },
]

# Rust: format check
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
language = "system"
entry = "cargo fmt --all -- --check"
pass_filenames = false
types = ["rust"]

# Rust: check (catches errors clippy might miss with different feature flags)
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-check"
name = "cargo check"
language = "system"
entry = "cargo check --workspace --all-targets"
pass_filenames = false
types = ["rust"]

# Rust: clippy lint
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
language = "system"
entry = "cargo clippy --workspace -- -D warnings"
pass_filenames = false
types = ["rust"]

# Rust: unused-dependency check across the whole workspace.
# cargo-machete is installed via mise (see mise.toml); `mise exec --` is used so
# the hook works even outside a mise-activated shell. This is the sole machete
# check: it runs locally on commit and in CI via the `pre-commit` job (which
# runs the full hook suite) — there is no separate cargo-machete CI job.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "cargo-machete"
name = "cargo machete (unused deps)"
language = "system"
entry = "mise exec -- cargo-machete"
pass_filenames = false
types = ["rust"]

# Python: ruff format check
[[repos]]
repo = "local"
[[repos.hooks]]
id = "ruff-format"
name = "ruff format"
language = "system"
entry = "uvx ruff format --check ppvm-python/src ppvm-python/test"
pass_filenames = false
types = ["python"]

# Python: ruff lint
[[repos]]
repo = "local"
[[repos.hooks]]
id = "ruff-check"
name = "ruff check"
language = "system"
entry = "uvx ruff check ppvm-python/"
pass_filenames = false
types = ["python"]

# License headers: hawkeye (Rust-based SPDX header checker)
# Installed via mise (see mise.toml); `mise exec --` is used so the hook
# works even outside a mise-activated shell. Run `mise exec -- hawkeye
# format` manually to apply headers to new files.
[[repos]]
repo = "local"
[[repos.hooks]]
id = "hawkeye"
name = "hawkeye license header check"
language = "system"
entry = "mise exec -- hawkeye check"
pass_filenames = false

# Python: ty type check
[[repos]]
repo = "local"
[[repos.hooks]]
id = "ty-check"
name = "ty check"
language = "system"
entry = "uvx ty check --project ppvm-python"
pass_filenames = false
types = ["python"]
